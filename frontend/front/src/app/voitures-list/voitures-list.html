<div class="list">
  <div class="container">
    <div class="table" *ngFor="let voiture of voitures">
      <div class="elem">
        <div class="voiture-name">{{ voiture.modele }}</div>
      
        <div class="buttons">
          <button class="display" (click)="afficherVoiture(voiture.id)">Afficher</button>
          <button class="modify" (click)="modifierVoiture(voiture.id)">Modifier</button>
          <button class="delete" (click)="deleteVoiture(voiture.id)">Supprimer</button>
        </div>
      </div>
    </div>

  </div>    
  <button class="display" (click)="createVoiture()"> Créer une voiture</button>
</div>
