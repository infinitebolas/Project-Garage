<div class="list">
  <div class="container">

    <div class="table" *ngFor="let garage of garages">

      <div class="elem">
        <div class="garage-name">{{ garage.nom }}</div>
        <div class="buttons">
          <button class="display" (click)="afficherGarage(garage.id)">Afficher</button>
          <button class="modify" (click)="modifierGarage(garage.id)">Modifier</button>
          <button class="delete" (click)="deleteGarage(garage.id)">Supprimer</button>
        </div>

      </div>

    </div>

  </div>
  <button class="display" (click)="createGarage()"> Créer un garage</button>
</div>
