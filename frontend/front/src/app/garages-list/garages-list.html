<div class="garages-container">

  <div class="garage-table" *ngFor="let garage of garages">

    <div class="garage">
      <div class="garage-name">{{ garage.nom }}</div>
      <div class="buttons">
        <button class="display" (click)="afficherGarage(garage.id)">Afficher</button>
        <button class="modify">Modifier</button>
        <button class="delete" (click)="deleteGarage(garage.id)">Supprimer</button>
      </div>

    </div>

  </div>

</div>
